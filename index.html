<script>
  (function(){
    var cfg = window.__basecampConfig;
    if(!cfg){
      document.addEventListener("DOMContentLoaded",function(){
        var el=document.getElementById("root");
        if(el) el.innerHTML='<div style="font-family:sans-serif;padding:40px;text-align:center;color:#636366"><div style="font-size:48px;margin-bottom:16px">⛺</div><div style="font-size:18px;font-weight:600;margin-bottom:8px">Config missing</div><div style="font-size:14px">Make sure <b>config.js</b> is in your repo.</div></div>';
      });
      return;
    }
    firebase.initializeApp(cfg);
    // Enable offline persistence — Firebase caches data locally
    // so listeners keep working without a connection
    try { firebase.database().goOnline(); } catch(e){}
    // Confirm DB is reachable — wrappers call firebase.database() directly
    window.__fbReady = true;
    window.dispatchEvent(new Event("fb-ready"));
  })();
</script>

<!-- Offline write queue — queues Firebase writes when offline, syncs on reconnect -->
<script>
(function(){
  var DB_NAME="basecamp_queue", DB_VER=1, STORE="writes";
  var db=null;

  function openDB(cb){
    if(db){cb(db);return;}
    var req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=function(e){e.target.result.createObjectStore(STORE,{keyPath:"id",autoIncrement:true});};
    req.onsuccess=function(e){db=e.target.result;cb(db);};
    req.onerror=function(){cb(null);};
  }

  function enqueue(op,path,val){
    openDB(function(db){
      if(!db)return;
      var tx=db.transaction(STORE,"readwrite");
      tx.objectStore(STORE).add({op:op,path:path,val:val||null,time:Date.now()});
    });
  }

  function flush(){
    openDB(function(db){
      if(!db)return;
      var tx=db.transaction(STORE,"readwrite");
      var store=tx.objectStore(STORE);
      store.getAll().onsuccess=function(e){
        var items=e.target.result;
        if(!items.length)return;
        items.forEach(function(item){
          try{
            var ref=firebase.database().ref(item.path);
            if(item.op==="set")  ref.set(item.val);
            if(item.op==="upd")  ref.update(item.val);
            if(item.op==="del")  ref.remove();
            // Remove from queue after firing
            openDB(function(db2){
              if(!db2)return;
              db2.transaction(STORE,"readwrite").objectStore(STORE).delete(item.id);
            });
          }catch(err){}
        });
      };
    });
  }

  window.__offlineQueue={enqueue:enqueue,flush:flush};

  // Flush queue when coming back online
  window.addEventListener("online",function(){
    setTimeout(flush,1000); // small delay to let connection stabilise
  });

  // Register Service Worker for offline app shell caching
  if("serviceWorker" in navigator){
    window.addEventListener("load",function(){
      navigator.serviceWorker.register("sw.js").catch(function(){});
    });
  }
})();
</script>

<style>
:root {
  --bg:       #F2F2F7;
  --surface:  #FFFFFF;
  --surf2:    #F7F7FA;
  --border:   rgba(0,0,0,.08);
  --text:     #1C1C1E;
  --text2:    #636366;
  --text3:    #AEAEB2;
  --accent:   #34C759;
  --blue:     #007AFF;
  --warn:     #FF9500;
  --danger:   #FF3B30;
  --purple:   #AF52DE;
  --sh:       0 1px 3px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.05);
  --sh-lg:    0 8px 40px rgba(0,0,0,.14);
  --r:        13px;
  --r-sm:     9px;
  --font:     'DM Sans', system-ui, sans-serif;
  --serif:    'DM Serif Display', Georgia, serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg)}
body{font-family:var(--font);color:var(--text);-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:var(--font)}
button{cursor:pointer;transition:opacity .12s,transform .1s}
button:active{transform:scale(.96);opacity:.85}
input[type=checkbox]{accent-color:var(--accent);cursor:pointer;flex-shrink:0}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
*{-webkit-tap-highlight-color:transparent}

@keyframes fadeIn {from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
@keyframes pop    {0%{transform:scale(.9);opacity:0}65%{transform:scale(1.03)}100%{transform:scale(1);opacity:1}}
@keyframes spin   {to{transform:rotate(360deg)}}
@keyframes check  {0%{transform:scale(1)}40%{transform:scale(1.25)}100%{transform:scale(1)}}

.fi{animation:fadeIn .22s ease both}
.pop{animation:pop .28s ease both}
.spin{animation:spin .7s linear infinite}

.stagger>.fi:nth-child(1){animation-delay:.03s}
.stagger>.fi:nth-child(2){animation-delay:.07s}
.stagger>.fi:nth-child(3){animation-delay:.11s}
.stagger>.fi:nth-child(4){animation-delay:.15s}
.stagger>.fi:nth-child(5){animation-delay:.19s}
.stagger>.fi:nth-child(6){animation-delay:.23s}
.stagger>.fi:nth-child(7){animation-delay:.27s}

/* Layout */
.layout{display:flex;height:100vh;overflow:hidden}
.sidebar{width:256px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto}
.content{flex:1;overflow-y:auto;background:var(--bg)}

@media(max-width:700px){
  .sidebar{display:none}
  .sidebar.open{display:flex;position:fixed;inset:0;width:100%;z-index:300;animation:fadeIn .18s ease}
  .content{width:100%}
}

/* Cards */
.card{background:var(--surface);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.crow{display:flex;align-items:center;padding:13px 16px;gap:11px;
  border-bottom:1px solid var(--border);transition:background .1s}
.crow:last-child{border-bottom:none}
.crow:active{background:var(--surf2)}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:9px 18px;border-radius:var(--r-sm);font-size:14px;font-weight:500;
  border:none;white-space:nowrap}
.btn-blue{background:var(--blue);color:#fff}
.btn-green{background:var(--accent);color:#fff}
.btn-ghost{background:var(--surf2);color:var(--text2);border:1px solid var(--border)}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:6px 13px;font-size:13px;border-radius:8px}
.btn-icon{padding:7px 9px;border-radius:8px;background:var(--surf2);border:1px solid var(--border);
  color:var(--text2);font-size:15px;line-height:1}

/* Input */
.inp{background:var(--surf2);border:1.5px solid var(--border);border-radius:var(--r-sm);
  padding:10px 13px;font-size:14px;color:var(--text);outline:none;width:100%;
  transition:border-color .15s,box-shadow .15s}
.inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,122,255,.12)}
.inp::placeholder{color:var(--text3)}

/* Pills */
.pill{display:inline-flex;align-items:center;gap:3px;padding:2px 9px;border-radius:20px;
  font-size:11px;font-weight:500;letter-spacing:.15px}
.p-green{background:#D1FAE5;color:#065F46}
.p-orange{background:#FEF3C7;color:#92400E}
.p-blue{background:#DBEAFE;color:#1E40AF}
.p-gray{background:var(--surf2);color:var(--text2);border:1px solid var(--border)}
.p-purple{background:#EDE9FE;color:#5B21B6}

/* Section label */
.slabel{font-size:11px;font-weight:600;letter-spacing:.8px;color:var(--text3);
  text-transform:uppercase;padding:18px 4px 8px}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;
  justify-content:center;z-index:500;padding:20px;animation:fadeIn .16s ease}
.modal{background:var(--surface);border-radius:18px;box-shadow:var(--sh-lg);
  width:100%;max-width:460px;max-height:88vh;overflow-y:auto;animation:pop .24s ease}

/* Chat bubble */
.bubble-me{background:var(--blue);color:#fff;border-radius:16px 16px 4px 16px}
.bubble-them{background:var(--surface);color:var(--text);border-radius:16px 16px 16px 4px;box-shadow:var(--sh)}

/* Donut */
.dring{fill:none;stroke-linecap:round;transition:stroke-dashoffset .65s cubic-bezier(.4,0,.2,1)}

/* Bar */
.bar-fill{height:100%;border-radius:3px;transition:width .55s cubic-bezier(.4,0,.2,1)}

/* Checked state */
.packed-row{background:var(--surf2)}
.packed-name{text-decoration:line-through;color:var(--text3)}
</style>

<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useCallback} = React;

// ── Constants ────────────────────────────────────────────────────────────────
const COLORS   = ["#34C759","#007AFF","#FF9500","#FF2D55","#AF52DE","#5AC8FA","#FF6B35","#30B0C7"];
const ADMIN_NAMES = ["Jose", "Sandy"]; // ← add/remove admin names here
const ADMIN_NAME  = ADMIN_NAMES[0]; // kept for backwards compat
const gid      = () => Math.random().toString(36).slice(2,10);
const ts       = () => Date.now();
const ago      = t => { const d=ts()-t,m=~~(d/6e4),h=~~(m/60),dy=~~(h/24); return dy?`${dy}d ago`:h?`${h}h ago`:m?`${m}m ago`:"just now"; };
const ac       = n  => COLORS[(n||"?").charCodeAt(0)%COLORS.length];
const lsGet    = (k,f) => { try{const v=localStorage.getItem(k);return v?JSON.parse(v):f}catch{return f} };
const lsSet    = (k,v) => { try{localStorage.setItem(k,JSON.stringify(v))}catch{} };
const urlTrip  = () => new URLSearchParams(location.search).get("trip");

const DEF_INV = [
  {id:"shelter",  name:"Shelter",          icon:"⛺",items:[{id:"i1",name:"Tent",qty:1,weight:""},{id:"i2",name:"Sleeping Bag",qty:1,weight:""},{id:"i3",name:"Sleeping Pad",qty:1,weight:""},{id:"i4",name:"Tarp / Rain Fly",qty:1,weight:""},{id:"i5",name:"Extra Stakes",qty:6,weight:""}]},
  {id:"cooking",  name:"Cooking",           icon:"🔥",items:[{id:"i6",name:"Camp Stove",qty:1,weight:""},{id:"i7",name:"Fuel Canister",qty:2,weight:""},{id:"i8",name:"Cook Pot",qty:1,weight:""},{id:"i9",name:"Utensil Set",qty:1,weight:""},{id:"i10",name:"Lighter",qty:2,weight:""},{id:"i11",name:"Cooler",qty:1,weight:""},{id:"i12",name:"Water Filter",qty:1,weight:""}]},
  {id:"clothing", name:"Clothing",          icon:"🧥",items:[{id:"i13",name:"Rain Jacket",qty:1,weight:""},{id:"i14",name:"Base Layer",qty:1,weight:""},{id:"i15",name:"Fleece Layer",qty:1,weight:""},{id:"i16",name:"Hiking Boots",qty:1,weight:""},{id:"i17",name:"Wool Socks",qty:3,weight:""},{id:"i18",name:"Sun Hat",qty:1,weight:""}]},
  {id:"nav",      name:"Navigation",        icon:"🧭",items:[{id:"i19",name:"Topographic Map",qty:1,weight:""},{id:"i20",name:"Compass",qty:1,weight:""},{id:"i21",name:"Headlamp + Batteries",qty:1,weight:""}]},
  {id:"safety",   name:"Safety & First Aid",icon:"🩹",items:[{id:"i22",name:"First Aid Kit",qty:1,weight:""},{id:"i23",name:"Emergency Whistle",qty:1,weight:""},{id:"i24",name:"Multi-tool",qty:1,weight:""},{id:"i25",name:"Sunscreen",qty:1,weight:""},{id:"i26",name:"Bug Spray",qty:1,weight:""},{id:"i27",name:"Bear Canister",qty:1,weight:""}]},
  {id:"hygiene",  name:"Hygiene",           icon:"🧼",items:[{id:"i28",name:"Toothbrush & Paste",qty:1,weight:""},{id:"i29",name:"Biodegradable Soap",qty:1,weight:""},{id:"i30",name:"Toilet Paper",qty:2,weight:""},{id:"i31",name:"Cat Hole Trowel",qty:1,weight:""},{id:"i32",name:"Hand Sanitizer",qty:1,weight:""}]},
];

// ── Firebase wrappers ────────────────────────────────────────────────────────
// Uses Firebase compat SDK directly. When offline, writes go to IndexedDB queue
// and flush automatically when connection returns.
const dbRef  = p       => firebase.database().ref(p);
const isOnline = ()    => navigator.onLine;

const fSet   = (p,v)   => {
  if(!isOnline()){ window.__offlineQueue.enqueue("set",p,v); return Promise.resolve(); }
  return dbRef(p).set(v);
};
const fUpd   = (p,v)   => {
  if(!isOnline()){ window.__offlineQueue.enqueue("upd",p,v); return Promise.resolve(); }
  return dbRef(p).update(v);
};
const fDel   = p       => {
  if(!isOnline()){ window.__offlineQueue.enqueue("del",p,null); return Promise.resolve(); }
  return dbRef(p).remove();
};
const fOn    = (p,cb)  => {
  const r = dbRef(p);
  const fn = snap => cb(snap.exists() ? snap.val() : null);
  r.on("value", fn);
  return () => r.off("value", fn);
};

// ── Excel helpers ────────────────────────────────────────────────────────────
function exportXLSX(inv) {
  const wb = XLSX.utils.book_new();
  const info=[["BASE CAMP Gear Template"],[""],
    ["Instructions:"],
    ["• Each sheet = one category (sheet name = category name)"],
    ["• Required columns: Name, Quantity"],
    ["• Optional: Weight (e.g. 1.2 kg)"],
    ["• Add new sheets for new categories — use emoji prefix e.g. '🏕️ Games'"],
    ["• Import this file back into Base Camp to update your inventory"],
  ];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(info),"📖 How to use");
  inv.forEach(cat=>{
    const rows=[["Name","Quantity","Weight (optional)"]];
    cat.items.forEach(i=>rows.push([i.name,i.qty,i.weight||""]));
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows),`${cat.icon} ${cat.name}`);
  });
  XLSX.writeFile(wb,"basecamp-gear.xlsx");
}

function parseXLSX(file,cb) {
  const r=new FileReader();
  r.onload=e=>{
    const wb=XLSX.read(e.target.result,{type:"array"});
    const cats=[];
    wb.SheetNames.forEach(sn=>{
      if(sn.startsWith("📖")) return;
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1});
      if(rows.length<2) return;
      const em=sn.match(/^(\p{Emoji})/u);
      const icon=em?em[1]:"📦";
      const name=sn.replace(/^(\p{Emoji}\s*)/u,"").trim();
      const items=rows.slice(1).filter(r=>r[0]).map(r=>({
        id:gid(),name:String(r[0]).trim(),qty:parseInt(r[1])||1,
        weight:r[2]?String(r[2]).trim():"",
      }));
      if(items.length) cats.push({id:gid(),name,icon,items});
    });
    cb(cats);
  };
  r.readAsArrayBuffer(file);
}

// ── Small UI pieces ──────────────────────────────────────────────────────────
function Toast({msg}){
  return msg?(
    <div style={{position:"fixed",top:62,left:"50%",transform:"translateX(-50%)",
      background:"#1C1C1E",color:"#fff",padding:"9px 20px",borderRadius:22,
      fontSize:13,fontWeight:500,zIndex:9999,boxShadow:"0 4px 24px rgba(0,0,0,.25)",
      whiteSpace:"nowrap",animation:"fadeIn .18s ease"}}>
      {msg}
    </div>
  ):null;
}

function Av({name,size=28}){
  return(
    <div style={{width:size,height:size,borderRadius:"50%",background:ac(name),
      display:"flex",alignItems:"center",justifyContent:"center",
      fontSize:size*.38,fontWeight:600,color:"#fff",flexShrink:0}}>
      {(name||"?")[0].toUpperCase()}
    </div>
  );
}

function Donut({pct=0,color="#34C759",sz=88,sw=9,label,sub}){
  const r=(sz-sw)/2, c=2*Math.PI*r, off=c*(1-Math.min(pct,100)/100);
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
      <svg width={sz} height={sz} style={{transform:"rotate(-90deg)"}}>
        <circle fill="none" cx={sz/2} cy={sz/2} r={r} stroke="var(--bg)" strokeWidth={sw}/>
        <circle className="dring" fill="none" cx={sz/2} cy={sz/2} r={r}
          stroke={color} strokeWidth={sw} strokeDasharray={c} strokeDashoffset={off}/>
      </svg>
      {label&&<div style={{fontSize:13,fontWeight:700,color:"var(--text)",marginTop:-4}}>{label}</div>}
      {sub&&<div style={{fontSize:11,color:"var(--text3)"}}>{sub}</div>}
    </div>
  );
}

function CatBars({items,color}){
  const cats=useMemo(()=>{
    const m={};
    (items||[]).forEach(i=>{
      if(!m[i.catName])m[i.catName]={n:i.catName,ic:i.catIcon||"📦",tot:0,packed:0,buy:0};
      m[i.catName].tot++;
      if(i.packed)m[i.catName].packed++;
      if(i.needsBuy&&!i.packed)m[i.catName].buy++;
    });
    return Object.values(m);
  },[items]);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:11}}>
      {cats.map(c=>{
        const pp=c.tot?~~(c.packed/c.tot*100):0;
        const bp=c.tot?~~(c.buy/c.tot*100):0;
        return(
          <div key={c.n}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
              <span style={{fontSize:13,fontWeight:500}}>{c.ic} {c.n}</span>
              <span style={{fontSize:12,color:"var(--text3)"}}>{c.packed}/{c.tot}</span>
            </div>
            <div style={{height:7,background:"var(--bg)",borderRadius:4,overflow:"hidden",display:"flex"}}>
              <div className="bar-fill" style={{width:`${pp}%`,background:color||"var(--accent)"}}/>
              <div className="bar-fill" style={{width:`${bp}%`,background:"var(--warn)",marginLeft:bp?2:0}}/>
            </div>
          </div>
        );
      })}
      <div style={{display:"flex",gap:14,marginTop:2}}>
        {[[color||"var(--accent)","Packed"],["var(--warn)","Needs buying"]].map(([cl,lb])=>(
          <span key={lb} style={{fontSize:11,color:"var(--text3)",display:"flex",alignItems:"center",gap:5}}>
            <span style={{width:8,height:8,borderRadius:2,background:cl,display:"inline-block"}}/>
            {lb}
          </span>
        ))}
      </div>
    </div>
  );
}

function WhoHasWhat({items}){
  const people=useMemo(()=>{
    const m={};
    (items||[]).forEach(i=>{
      const p=i.assignedTo||(i.someoneElse?"Someone else":null);
      if(!p)return;
      if(!m[p])m[p]={name:p,done:[],todo:[]};
      (i.packed?m[p].done:m[p].todo).push(i);
    });
    return Object.values(m);
  },[items]);
  if(!people.length)return(
    <div style={{color:"var(--text3)",fontSize:13,textAlign:"center",padding:"20px 0"}}>
      Assign items to friends to track who's bringing what.
    </div>
  );
  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {people.map(p=>{
        const tot=p.done.length+p.todo.length;
        const pct=~~(p.done.length/tot*100);
        return(
          <div key={p.name} style={{background:"var(--surf2)",borderRadius:11,padding:"12px 14px"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:p.todo.length?8:0}}>
              <Av name={p.name}/>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:600}}>{p.name}</div>
                <div style={{fontSize:12,color:"var(--text3)"}}>{p.done.length} packed · {p.todo.length} outstanding</div>
              </div>
              <span style={{fontSize:13,fontWeight:700,color:pct===100?"var(--accent)":"var(--warn)"}}>{pct}%</span>
            </div>
            {p.todo.length>0&&(
              <div style={{display:"flex",flexWrap:"wrap",gap:5,paddingLeft:38}}>
                {p.todo.map(i=>(
                  <span key={i.id} className={`pill ${i.needsBuy?"p-orange":"p-gray"}`}>
                    {i.needsBuy?"🛒 ":""}{i.name}
                  </span>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── Note thread ───────────────────────────────────────────────────────────────
function NoteThread({tripId,itemId,notes,myName,fbReady}){
  const [open,setOpen]=useState(false);
  const [txt,setTxt]=useState("");
  const list=useMemo(()=>Object.entries(notes||{}).sort((a,b)=>a[1].ts-b[1].ts),[notes]);

  const post=()=>{
    if(!txt.trim()||!fbReady)return;
    const id=gid();
    fUpd(`trips/${tripId}/items/${itemId}/notes`,{[id]:{id,author:myName,text:txt.trim(),ts:ts()}});
    setTxt("");
  };

  return(
    <div style={{marginTop:5}}>

// ── Inline editable text ─────────────────────────────────────────────────────
function InlineEdit({value,onSave,style={}}){
  const [editing,setEditing] = useState(false);
  const [val,setVal]         = useState(value);
  const inputRef             = useRef();
  useEffect(()=>{ if(editing && inputRef.current) inputRef.current.select(); },[editing]);
  const save = ()=>{ const v=val.trim(); if(v&&v!==value) onSave(v); else setVal(value); setEditing(false); };
  if(editing) return(
    <input ref={inputRef}
      style={{...style,background:"var(--surf2)",border:"1.5px solid var(--blue)",
        borderRadius:6,padding:"2px 7px",outline:"none",width:"100%",
        boxShadow:"0 0 0 3px rgba(0,122,255,.12)"}}
      value={val} onChange={e=>setVal(e.target.value)}
      onBlur={save}
      onKeyDown={e=>{ if(e.key==="Enter"){e.preventDefault();save();} if(e.key==="Escape"){setVal(value);setEditing(false);} }}/>
  );
  return(
    <span style={{...style,cursor:"text",borderRadius:6,padding:"2px 4px",
      transition:"background .12s"}}
      title="Click to edit"
      onClick={e=>{e.stopPropagation();setEditing(true);}}
      onMouseEnter={e=>e.currentTarget.style.background="var(--surf2)"}
      onMouseLeave={e=>e.currentTarget.style.background=""}>
      {value}
    </span>
  );
}

  const [trips,    setTrips]    = useState([]);
  const [chats,    setChats]    = useState({});
  const [activeId, setActiveId] = useState(null);
  const [view,     setView]     = useState("home");
  const [toast,    setToast]    = useState(null);
  const [online,   setOnline]   = useState(()=>navigator.onLine);
  const [sideOpen, setSideOpen] = useState(false);
  const [conflicts,setConflicts]= useState(null);
  const [pending,  setPending]  = useState(null);
  const [expCats,  setExpCats]  = useState({});
  const [filters, setFilters] = useState({person:"all",status:"all"});
  const [nim,      setNim]      = useState({}); // newItemMap
  const [newCat,   setNewCat]   = useState("");
  const [newFrd,   setNewFrd]   = useState("");
  const [newTrip,  setNewTrip]  = useState("");
  const [chatTxt,  setChatTxt]  = useState("");
  const [showAC,   setShowAC]   = useState(false);
  const [showNT,   setShowNT]   = useState(false);
  const [showTmpl, setShowTmpl] = useState(false);
  const [showNewTmpl, setShowNewTmpl] = useState(false);
  const [newTmplName, setNewTmplName] = useState("");
  const [tripMembers, setTripMembers] = useState([]); // friend ids selected for new trip
  const [tripGear,    setTripGear]    = useState({}); // {itemId: true} selected gear items
  const [tripCatOpen, setTripCatOpen] = useState({}); // {catId: bool} expanded cats in create panel
  const [tripYear,    setTripYear]    = useState(()=>new Date().getFullYear().toString());
  const [tripDates,   setTripDates]   = useState(""); // optional date range string
  const fileRef  = useRef();
  const chatBtm  = useRef();

  const notify = m => { setToast(m); setTimeout(()=>setToast(null),2500); };
  const goTrip = (id,v="trip") => navigate(v,id);

  // Track online/offline status
  useEffect(()=>{
    const goOn  = ()=>{ setOnline(true);  notify("Back online — syncing changes…"); };
    const goOff = ()=>{ setOnline(false); };
    window.addEventListener("online",  goOn);
    window.addEventListener("offline", goOff);
    return ()=>{ window.removeEventListener("online",goOn); window.removeEventListener("offline",goOff); };
  },[]);

  // Firebase ready — check flag first, then poll every 50ms so it's near-instant
  useEffect(()=>{
    if(window.__fbReady){ setFbReady(true); return; }
    const poll = setInterval(()=>{
      if(window.__fbReady){ setFbReady(true); clearInterval(poll); }
    }, 50);
    const h=()=>{ setFbReady(true); clearInterval(poll); };
    window.addEventListener("fb-ready",h);
    return ()=>{ window.removeEventListener("fb-ready",h); clearInterval(poll); };
  },[]);

  // URL deep-link & history navigation
  useEffect(()=>{
    const apply = (st) => {
      if(st){ setView(st.view||"home"); setActiveId(st.activeId||null); }
      else {
        try {
          const p=new URLSearchParams(location.search);
          const tid=p.get("trip"), v=p.get("view")||"home";
          setView(tid?"trip":v); setActiveId(tid||null);
        } catch(e) {}
      }
    };
    // seed initial state
    try {
      const p=new URLSearchParams(location.search);
      const tid=p.get("trip"), v=p.get("view")||"home";
      const initView=tid?"trip":v, initId=tid||null;
      history.replaceState({view:initView,activeId:initId},"",location.href);
      setView(initView); setActiveId(initId);
    } catch(e) {}
    const onPop=e=>apply(e.state);
    window.addEventListener("popstate",onPop);
    return ()=>window.removeEventListener("popstate",onPop);
  },[]);

  const navigate=(newView,newActiveId=null,replace=false)=>{
    if(newView!=="inventory"){ setInvSearch(""); setAddQuick(null); }
    try {
      const url=new URL(location.href);
      url.searchParams.delete("trip"); url.searchParams.delete("view");

      else if(newView!=="home") url.searchParams.set("view",newView);

      replace?history.replaceState(st,"",url):history.pushState(st,"",url);

  // Live trips
  useEffect(()=>{
    if(!fbReady)return;
    return fOn("trips",data=>{
      setTrips(data?Object.values(data).map(t=>({...t,items:t.items||{}})):[]);

  // Live friends — shared across all devices via Firebase
  useEffect(()=>{
    if(!fbReady)return;
    return fOn("friends",data=>{
      setFriends(data?Object.values(data).sort((a,b)=>a.name.localeCompare(b.name)):[]);

  // Live templates — stored in Firebase so they persist
  useEffect(()=>{
    if(!fbReady)return;
    return fOn("templates",data=>{
      setTmpls(data?Object.values(data):[]);

  },[fbReady]);

  // Live chat for active trip
  useEffect(()=>{
    if(!fbReady||!activeId)return;
    return fOn(`chats/${activeId}`,data=>setChats(data||{}));

  // Scroll chat
  useEffect(()=>{ if(chatBtm.current) chatBtm.current.scrollIntoView({behavior:"smooth"}); },[chats,view]);

  // Persist local data
  useEffect(()=>lsSet("bc_inv",inv),[inv]);

  const activeTrip = useMemo(()=>trips.find(t=>t.id===activeId)||null,[trips,activeId]);
  const tripItems  = useMemo(()=>activeTrip?Object.values(activeTrip.items):[],[activeTrip]);

  const stats = useMemo(()=>{
    const tot=tripItems.length, packed=tripItems.filter(i=>i.packed).length,
          buy=tripItems.filter(i=>i.needsBuy&&!i.packed).length,
          asgn=tripItems.filter(i=>(i.assignedTo||i.someoneElse)&&!i.packed).length,
          pct=tot?~~(packed/tot*100):0;
    return {tot,packed,buy,asgn,pct};
  },[tripItems]);

  const filtItems = useMemo(()=>tripItems.filter(i=>{
    if(filters.person!=="all"){
      if(i.assignedTo!==filters.person&&!(i.someoneElse&&!i.assignedTo&&filters.person==="Someone else")) return false;

  const tripCats = useMemo(()=>{
    const ids=[...new Set(filtItems.map(i=>i.catId))];
    return ids.map(cid=>({
      catId:cid,
      catName:filtItems.find(i=>i.catId===cid)?.catName||"",
      catIcon:filtItems.find(i=>i.catId===cid)?.catIcon||"📦",
      items:filtItems.filter(i=>i.catId===cid),

  },[filtItems]);

  const chatList = useMemo(()=>Object.values(chats).sort((a,b)=>a.ts-b.ts),[chats]);
  const shareUrl = activeId?`${location.origin}${location.pathname}?trip=${activeId}`:"";
  // Friends available for this trip — filtered to trip members, or all friends if none set
  const tripFriends = useMemo(()=>{
    if(!activeTrip) return friends;
    const mids = activeTrip.members;
    if(!mids||!Array.isArray(mids)||!mids.length) return friends;
    return friends.filter(f=>mids.includes(f.id));
  },[activeTrip,friends]);
  const [invSearch,   setInvSearch]   = useState("");  // global inventory search
  const [addQuick,    setAddQuick]    = useState(null); // {name,catId,qty} for quick-add from search

  // Fuzzy similarity — detects plurals, minor typos, substrings
  const isSimilar = (a, b) => {
    const norm = s => s.toLowerCase().trim().replace(/s$/,""); // strip trailing s for plural
    const na=norm(a), nb=norm(b);
    if(na===nb) return true;                          // exact after normalising
    if(na.includes(nb)||nb.includes(na)) return true; // one contains the other
    // Levenshtein distance for short strings
    if(Math.abs(na.length-nb.length)>3) return false;
    let dp=Array.from({length:nb.length+1},(_,i)=>i);
    for(let i=1;i<=na.length;i++){
      let prev=i;
      for(let j=1;j<=nb.length;j++){
        const val=na[i-1]===nb[j-1]?dp[j-1]:1+Math.min(dp[j-1],dp[j],prev);
        dp[j-1]=prev; prev=val;
      }
      dp[nb.length]=prev;
    }
    return dp[nb.length]<=2; // allow up to 2 edits
  };

  const addCat   = ()=>{ if(!newCat.trim())return; setInv(p=>[...p,{id:gid(),name:newCat.trim(),icon:"📦",items:[]}]); setNewCat(""); setShowAC(false); notify("Category added"); };
  const delCat   = id=>setInv(p=>p.filter(c=>c.id!==id));
  const renameCat = (catId,newName)=>{ if(!newName.trim())return; setInv(p=>p.map(c=>c.id===catId?{...c,name:newName.trim()}:c)); };
  const addItem  = (catId, overrideName=null)=>{
    const n=(overrideName||(nim[catId]||"")).trim(); if(!n)return;
    const cat=inv.find(c=>c.id===catId);
    const similar=cat&&cat.items.find(i=>isSimilar(i.name,n));
    if(similar){ if(!confirm(`"${similar.name}" already exists — looks similar to "${n}". Add anyway?`)) return; }
    setInv(p=>p.map(c=>c.id===catId?{...c,items:[...c.items,{id:gid(),name:n,qty:1,weight:""}]}:c));
    if(!overrideName) setNim(p=>({...p,[catId]:""}));
    setAddQuick(null); setInvSearch("");
    notify("Item added");
  };
  const addItemFromQuick = ()=>{
    if(!addQuick||!addQuick.catId) return;
    const n=addQuick.name.trim(); if(!n)return;
    const cat=inv.find(c=>c.id===addQuick.catId);
    const similar=cat&&cat.items.find(i=>isSimilar(i.name,n));
    if(similar){ if(!confirm(`"${similar.name}" already exists — looks similar. Add anyway?`)) return; }
    setInv(p=>p.map(c=>c.id===addQuick.catId?{...c,items:[...c.items,{id:gid(),name:n,qty:addQuick.qty||1,weight:""}]}:c));
    setAddQuick(null); setInvSearch(""); notify("Item added to inventory");
  };
  const delItem        = (catId,iid)=>setInv(p=>p.map(c=>c.id===catId?{...c,items:c.items.filter(i=>i.id!==iid)}:c));
  const updateItemName = (catId,itemId,name)=>{ if(!name.trim())return; setInv(p=>p.map(c=>c.id===catId?{...c,items:c.items.map(i=>i.id===itemId?{...i,name:name.trim()}:i)}:c)); };
  const moveItem = (catId,itemId,dir)=>{
    setInv(p=>p.map(c=>{
      if(c.id!==catId) return c;
      const items=[...c.items];
      const idx=items.findIndex(i=>i.id===itemId);
      const target=idx+dir;
      if(target<0||target>=items.length) return c;
      [items[idx],items[target]]=[items[target],items[idx]];
      return {...c,items};
    }));
  };
  const saveItemToInventory = (item)=>{
    const cat=inv.find(c=>c.id===item.catId)||inv[0];
    if(!cat) return;
    const similar=cat.items.find(i=>isSimilar(i.name,item.name));
    if(similar){ notify(`"${similar.name}" already in inventory`); return; }
    setInv(p=>p.map(c=>c.id===cat.id?{...c,items:[...c.items,{id:gid(),name:item.name,qty:item.qty||1,weight:item.weight||""}]}:c));
    notify(`"${item.name}" saved to ${cat.name}`);
  };

  // Inventory search results
  const invSearchResults = useMemo(()=>{
    const q=invSearch.trim().toLowerCase();
    if(!q) return null;
    const results=[];
    inv.forEach(cat=>{
      cat.items.forEach(item=>{
        if(item.name.toLowerCase().includes(q)||isSimilar(item.name,q))
          results.push({...item,catId:cat.id,catName:cat.name,catIcon:cat.icon});
      });
    });
    return results;
  },[invSearch,inv]);

  // ── Friends ops (Firebase-backed, shared across all devices) ──
  const addFriend = (name) => {
    if(!name.trim()||!fbReady) return;
    // Don't add duplicates
    if(friends.some(f=>f.name.toLowerCase()===name.trim().toLowerCase())) return;
    const id=gid();
    fUpd("friends",{[id]:{id,name:name.trim()}});
  };
  const removeFriend = (id) => fDel(`friends/${id}`);
  const renameFriend = (id,newName) => { if(newName.trim()&&fbReady) fUpd(`friends/${id}`,{name:newName.trim()}); };

  // ── Import ──
  const handleFile = file=>{
    parseXLSX(file,imported=>{
      const existing=new Set(inv.flatMap(c=>c.items.map(i=>i.name.toLowerCase())));
      const conf=[];
      imported.forEach(cat=>cat.items.forEach(item=>{ if(existing.has(item.name.toLowerCase())) conf.push({...item,catName:cat.name}); }));
      if(conf.length){ setConflicts(conf); setPending(imported); }
      else applyImport(imported,{});
    });
  };
  const applyImport=(imported,dec)=>{
    setInv(prev=>{
      let res=[...prev];
      imported.forEach(ic=>{
        const ec=res.find(c=>c.name.toLowerCase()===ic.name.toLowerCase());
        if(ec){
          const merged=[...ec.items];
          ic.items.forEach(ni=>{
            const ei=merged.findIndex(x=>x.name.toLowerCase()===ni.name.toLowerCase());
            if(ei===-1) merged.push(ni);
            else if((dec[ni.id]||"keep")==="replace") merged[ei]={...merged[ei],...ni,id:merged[ei].id};
          });
          res=res.map(c=>c.id===ec.id?{...c,items:merged}:c);
        } else res=[...res,ic];
      });
      return res;
    });
    setConflicts(null); setPending(null); notify("Import complete!");
  };

  // ── Trip ops ──
  const createTrip = async (tmpl=null)=>{
    const name=(tmpl?tmpl.name:newTrip).trim();
    if(!name||!fbReady)return;
    const color=COLORS[trips.length%COLORS.length];
    const items={};
    const srcCats = tmpl ? tmpl.cats : inv;
    const hasGearSelection = !tmpl && Object.keys(tripGear).length>0;
    srcCats.forEach(cat=>{
      cat.items.forEach(item=>{
        // If user made a selection, only include checked items; otherwise include all
        if(hasGearSelection && !tripGear[item.id]) return;
        const id=gid();
        items[id]={id,catId:cat.id,catName:cat.name,catIcon:cat.icon,
          name:item.name,qty:item.qty||1,weight:item.weight||"",
          packed:false,needsBuy:false,someoneElse:false,assignedTo:myName,notes:{}};
      });
    });
    const t={id:gid(),name,color,createdAt:ts(),
      year: tmpl?String(new Date().getFullYear()):tripYear,
      dates: tmpl?"":tripDates,
      members: tripMembers.length>0 ? tripMembers : (tmpl?.members||friends.map(f=>f.id)),
      items};
    await fSet(`trips/${t.id}`,t);
    navigate("trip",t.id);
    setNewTrip(""); setTripMembers([]); setTripGear({}); setTripCatOpen({});

    notify(`"${name}" created!`);

  const deleteTrip = async id=>{ await fDel(`trips/${id}`); if(activeId===id) navigate("trips"); notify("Trip deleted"); };
  const saveTemplate = ()=>{
    if(!activeTrip||!fbReady)return;
    const cats=[...new Set(tripItems.map(i=>i.catId))].map(cid=>({
      id:cid, name:tripItems.find(i=>i.catId===cid).catName,
      icon:tripItems.find(i=>i.catId===cid).catIcon||"📦",
      items:tripItems.filter(i=>i.catId===cid).map(i=>({id:gid(),name:i.name,qty:i.qty,weight:i.weight||""})),

    const id=gid();
    const tmpl={id,name:activeTrip.name,cats,
      members:activeTrip.members||[],
      createdAt:ts(),fromTrip:activeTrip.id};

    notify("Saved as template!");
  };
  const deleteTemplate = id=>{ fDel(`templates/${id}`); notify("Template deleted"); };
  const createTmplFromScratch = ()=>{
    // Navigate to templates page with new-template form open
    navigate("templates"); setShowNewTmpl(true);
  };
  const addTripItem=(catId,catName,catIcon)=>{
    const k=`t-${catId}`, n=(nim[k]||"").trim(); if(!n||!fbReady)return;
    const id=gid();
    fUpd(`trips/${activeId}/items`,{[id]:{id,catId,catName,catIcon:catIcon||"📦",name:n,qty:1,weight:"",packed:false,needsBuy:false,someoneElse:false,assignedTo:myName,notes:{}}});
    setNim(p=>({...p,[k]:""})); notify("Item added to trip");
  };

  // ── Chat ──
  const sendChat=()=>{
    if(!chatTxt.trim()||!fbReady)return;
    const id=gid();
    fUpd(`chats/${activeId}`,{[id]:{id,author:myName,text:chatTxt.trim(),ts:ts()}});
    setChatTxt("");
  };

  // ── Sidebar ──
  const SB=()=>(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{padding:"22px 18px 10px",display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={()=>navigate("home")}>
        <span style={{fontSize:22}}>⛺</span>
        <span style={{fontFamily:"var(--serif)",fontSize:17,letterSpacing:.3}}>Base Camp</span>
      </div>
      <div style={{padding:"0 10px",flex:1}}>
        {[["home","🏠","Home"],["inventory","🎒","My Gear"],["friends","👥","Friends"],["trips","🗺️","Trips"],["templates","📋","Templates"]].map(([v,ic,lb])=>(
          <button key={v} onClick={()=>navigate(v)}
            style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"10px 12px",
              borderRadius:10,border:"none",textAlign:"left",fontSize:14,fontWeight:500,marginBottom:2,
              background:(view===v&&!activeId)?"var(--bg)":"transparent",
              color:(view===v&&!activeId)?"var(--blue)":"var(--text2)",transition:"all .14s"}}>
            <span style={{fontSize:16,width:20,textAlign:"center"}}>{ic}</span>{lb}
          </button>
        ))}
        {trips.length>0&&(()=>{
          // Group trips by year
          const byYear={};
          trips.forEach(t=>{ const y=t.year||"Other"; if(!byYear[y])byYear[y]=[]; byYear[y].push(t); });
          const years=Object.keys(byYear).sort((a,b)=>b-a);
          return years.map(year=>(
            <React.Fragment key={year}>
              <div className="slabel" style={{padding:"14px 12px 5px"}}>{year}</div>
              {byYear[year].map(t=>(
                <button key={t.id} onClick={()=>goTrip(t.id)}
                  style={{width:"100%",display:"flex",alignItems:"center",gap:9,padding:"9px 12px",
                    borderRadius:10,border:"none",textAlign:"left",fontSize:13,fontWeight:500,marginBottom:2,
                    background:activeId===t.id?"var(--bg)":"transparent",
                    color:activeId===t.id?t.color:"var(--text2)",transition:"all .14s"}}>
                  <span style={{width:8,height:8,borderRadius:"50%",background:t.color,flexShrink:0}}/>
                  <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.name}</span>
                </button>
              ))}
            </React.Fragment>
          ));
        })()}
      </div>
      <div style={{padding:"12px 18px 20px",borderTop:"1px solid var(--border)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <Av name={myName} size={26}/>
          <span style={{fontSize:13,color:"var(--text2)",flex:1}}>{myName}</span>
        </div>
      </div>
    </div>
  );

  // Show loading screen if name is set but Firebase not ready yet
  // (happens when user taps their name before the Firebase module finishes)
  if(myName && !fbReady) return(
    <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",flexDirection:"column",
      alignItems:"center",justifyContent:"center",gap:16}}>
      <div style={{fontSize:44}}>⛺</div>
      <div style={{width:36,height:36,border:"3px solid var(--border)",borderTopColor:"var(--blue)",
        borderRadius:"50%",animation:"spin .7s linear infinite"}}/>
      <div style={{fontSize:14,color:"var(--text3)",letterSpacing:.3}}>Loading camp…</div>
    </div>
  );


  if(!myName) return <LandingPage friends={friends} onEnter={name=>{
    setMyName(name); lsSet("bc_name",name);
    // Save to shared Firebase friends list if not already there
    if(fbReady && !friends.some(f=>f.name.toLowerCase()===name.toLowerCase())){
      const id=gid(); fUpd("friends",{[id]:{id,name}});
    }
  }}/>;

  const TripTabs=()=>activeTrip?(
    <div style={{display:"flex",gap:5}}>
      {[["trip","✓ List"],["dashboard","📊"],["chat","💬"]].map(([v,lb])=>(
        <button key={v} onClick={()=>navigate(v,activeId)}
          style={{fontSize:12,padding:"5px 10px",borderRadius:8,border:"none",fontWeight:500,
            background:view===v?"var(--blue)":"var(--surf2)",
            color:view===v?"#fff":"var(--text2)"}}>
          {lb}
        </button>
      ))}
    </div>
  ):null;

  return(
    <div className="layout">
      <Toast msg={toast}/>
      {conflicts&&<ConflictModal conflicts={conflicts} onResolve={d=>applyImport(pending,d)} onClose={()=>{setConflicts(null);setPending(null);}}/>}

      {/* Sidebar */}
      <div className={`sidebar${sideOpen?" open":""}`}>
        {sideOpen&&<button onClick={()=>setSideOpen(false)}
          style={{position:"absolute",top:14,right:14,background:"none",border:"none",fontSize:20,color:"var(--text2)",zIndex:10}}>✕</button>}
        <SB/>
      </div>

      {/* Content */}
      <div className="content">
        {/* Top bar */}
        <div style={{background:"var(--surface)",borderBottom:"1px solid var(--border)",
          padding:"12px 16px",display:"flex",alignItems:"center",gap:10,
          position:"sticky",top:0,zIndex:100,minHeight:54}}>
          <button className="btn-icon" onClick={()=>setSideOpen(p=>!p)}>☰</button>
          {(view!=="home"||activeId)&&(
            <button className="btn-icon" title="Home" onClick={()=>navigate("home")} style={{fontSize:14,flexShrink:0}}>🏠</button>
          )}
          <span style={{fontFamily:"var(--serif)",fontSize:16,flex:1,color:"var(--text)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
            {activeTrip?activeTrip.name:view==="home"?"Base Camp":view==="inventory"?"My Gear":view==="friends"?"Friends":view==="templates"?"Templates":"Trips"}
          </span>
          <TripTabs/>
          {!online&&(
            <span style={{fontSize:11,fontWeight:600,padding:"3px 9px",borderRadius:12,
              background:"#FEF3C7",color:"#92400E",flexShrink:0,whiteSpace:"nowrap"}}>
              ✈️ Offline
            </span>
          )}
        </div>

        {/* ════ HOME ════ */}
        {view==="home"&&(
          <div style={{padding:"28px 18px 60px",maxWidth:680,margin:"0 auto"}} className="fi">
            <div style={{fontFamily:"var(--serif)",fontSize:32,marginBottom:8,lineHeight:1.2}}>Hey, {myName} 👋</div>
            <div style={{fontSize:15,color:"var(--text2)",marginBottom:30,lineHeight:1.7}}>Ready for your next adventure?</div>

            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10,marginBottom:30}} className="stagger">
              {[
                {ic:"🎒",v:inv.reduce((a,c)=>a+c.items.length,0),lb:"Gear items",  cl:"var(--blue)",   dest:"inventory"},
                {ic:"🗺️",v:trips.length,                          lb:"Trips",       cl:"var(--accent)", dest:"trips"},
                {ic:"👥",v:friends.length,                        lb:"Friends",     cl:"var(--warn)",   dest:"friends"},
                {ic:"📋",v:tmpls.length,                          lb:"Templates",   cl:"var(--purple)", dest:"templates"},
              ].map(s=>(
                <div key={s.lb} className="card fi" style={{padding:"16px 16px",cursor:"pointer"}}
                  onClick={()=>{ navigate(s.dest); }}>
                  <div style={{fontSize:22,marginBottom:6}}>{s.ic}</div>
                  <div style={{fontSize:26,fontWeight:700,color:s.cl,lineHeight:1}}>{s.v}</div>
                  <div style={{fontSize:12,color:"var(--text3)",marginTop:3}}>{s.lb}</div>
                  <div style={{fontSize:10,color:s.cl,marginTop:5,fontWeight:600}}>View →</div>
                </div>
              ))}
            </div>

            {trips.length>0&&(
              <>
                <div className="slabel">RECENT TRIPS</div>
                <div className="card" style={{marginBottom:26}}>
                  {trips.slice(-5).reverse().map(t=>{
                    const its=Object.values(t.items||{});
                    const pct=its.length?~~(its.filter(i=>i.packed).length/its.length*100):0;

                      <div key={t.id} className="crow" style={{cursor:"pointer"}} onClick={()=>goTrip(t.id)}>

                        </div>
                        <span style={{fontSize:12,fontWeight:700,color:t.color,width:32,textAlign:"right"}}>{pct}%</span>
                        <span style={{color:"var(--text3)",fontSize:18,lineHeight:1}}>›</span>
                      </div>

              </>

            <div className="slabel">QUICK ACTIONS</div>
            <div style={{display:"flex",gap:9,flexWrap:"wrap"}}>
              <button className="btn btn-green" onClick={()=>{navigate("trips");setShowNT(true);}}>+ New Trip</button>
              <button className="btn btn-ghost" onClick={()=>navigate("inventory")}>Manage Gear</button>
              {tmpls.length>0&&<button className="btn btn-ghost" onClick={()=>navigate("templates")}>📋 Templates</button>}
            </div>
          </div>
        )}

        {/* ════ INVENTORY ════ */}
        {view==="inventory"&&(
          <div style={{padding:"20px 16px 60px",maxWidth:680,margin:"0 auto"}} className="fi">
            <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:20,flexWrap:"wrap"}}>
              <span style={{fontFamily:"var(--serif)",fontSize:24,flex:1}}>My Gear</span>
              <button className="btn btn-ghost btn-sm" onClick={()=>exportXLSX(inv)}>⬇ Export</button>
              <button className="btn btn-ghost btn-sm" onClick={()=>fileRef.current.click()}>⬆ Import</button>
              <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{display:"none"}}

                  </div>
                  {inv.map(cat=>{
                    const catOpen=tripCatOpen[`tmpl-${cat.id}`]===true;
                    const selCount=cat.items.filter(i=>tripGear[i.id]).length;
                    const allSel=cat.items.length>0&&selCount===cat.items.length;
                    return(
                      <div key={cat.id} style={{marginBottom:5,border:"1px solid var(--border)",borderRadius:9,overflow:"hidden"}}>
                        <div style={{display:"flex",alignItems:"center",background:"var(--surf2)",padding:"8px 11px",gap:7}}>
                          <button onClick={()=>setTripCatOpen(p=>({...p,[`tmpl-${cat.id}`]:!catOpen}))}
                            style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"var(--text3)",padding:0,width:16,flexShrink:0}}>
                            {catOpen?"▼":"▶"}
                          </button>
                          <span style={{fontSize:13,fontWeight:600,color:"var(--text)",flex:1,cursor:"pointer"}}
                            onClick={()=>setTripCatOpen(p=>({...p,[`tmpl-${cat.id}`]:!catOpen}))}>
                            {cat.icon} {cat.name}
                          </span>
                          <span style={{fontSize:11,color:selCount>0?"var(--blue)":"var(--text3)",fontWeight:selCount>0?600:400}}>
                            {Object.keys(tripGear).length===0?"all":selCount===0?"none":`${selCount}/${cat.items.length}`}
                          </span>
                          <button onClick={()=>{
                            if(allSel) setTripGear(p=>{ const n={...p}; cat.items.forEach(i=>delete n[i.id]); return n; });
                            else setTripGear(p=>{ const n={...p}; cat.items.forEach(i=>n[i.id]=true); return n; });
                          }} style={{fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:6,border:"1.5px solid",cursor:"pointer",flexShrink:0,
                            borderColor:allSel?"var(--danger)":"var(--blue)",color:allSel?"var(--danger)":"var(--blue)",background:"transparent"}}>
                            {allSel?"✕ None":"✓ All"}
                          </button>
                        </div>
                        {catOpen&&(
                          <div style={{background:"var(--surface)"}}>
                            {cat.items.map(item=>{
                              const sel=tripGear[item.id]===true;
                              return(
                                <label key={item.id} style={{display:"flex",alignItems:"center",gap:9,padding:"7px 13px",
                                  borderTop:"1px solid var(--border)",cursor:"pointer",background:sel?"#F0F6FF":"transparent"}}>
                                  <input type="checkbox" checked={sel}
                                    onChange={()=>setTripGear(p=>{ const n={...p}; if(n[item.id]) delete n[item.id]; else n[item.id]=true; return n; })}
                                    style={{width:14,height:14,accentColor:"var(--blue)",flexShrink:0}}/>
                                  <span style={{fontSize:13,color:sel?"var(--text)":"var(--text2)",flex:1,fontWeight:sel?500:400}}>{item.name}</span>
                                  {item.qty>1&&<span style={{fontSize:11,color:"var(--text3)"}}>×{item.qty}</span>}
                                </label>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>

                {/* Member selector */}
                {friends.length>0&&(
                  <div style={{marginBottom:14}}>
                    <div style={{fontSize:11,fontWeight:600,letterSpacing:.7,color:"var(--text3)",marginBottom:8}}>
                      DEFAULT CREW
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {friends.map(f=>{
                        const sel=tripMembers.includes(f.id);
                        return(
                          <button key={f.id} onClick={()=>setTripMembers(p=>sel?p.filter(x=>x!==f.id):[...p,f.id])}
                            style={{display:"flex",alignItems:"center",gap:5,padding:"5px 11px 5px 6px",
                              borderRadius:20,border:"1.5px solid",cursor:"pointer",fontSize:12,fontWeight:500,
                              borderColor:sel?"var(--blue)":"var(--border)",
                              background:sel?"#EEF5FF":"var(--surf2)",
                              color:sel?"var(--blue)":"var(--text2)"}}>
                            <Av name={f.name} size={18}/>{f.name}{sel&&" ✓"}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                )}

                <div style={{display:"flex",gap:8}}>
                  <button className="btn btn-blue" style={{fontSize:13,padding:"8px 18px"}}
                    disabled={!newTmplName.trim()}
                    onClick={()=>{
                      if(!newTmplName.trim()||!fbReady)return;
                      const id=gid();
                      const cats=inv.filter(cat=>
                        Object.keys(tripGear).length===0||cat.items.some(i=>tripGear[i.id])
                      ).map(cat=>({
                        id:cat.id,name:cat.name,icon:cat.icon,
                        items: Object.keys(tripGear).length===0
                          ? cat.items.map(i=>({id:gid(),name:i.name,qty:i.qty,weight:i.weight||""}))
                          : cat.items.filter(i=>tripGear[i.id]).map(i=>({id:gid(),name:i.name,qty:i.qty,weight:i.weight||""})),
                      }));
                      const tmpl={id,name:newTmplName.trim(),cats,members:tripMembers,createdAt:ts()};
                      fUpd("templates",{[id]:tmpl});
                      setNewTmplName(""); setTripGear({}); setTripMembers([]); setTripCatOpen({});
                      setShowNewTmpl(false); notify("Template saved!");
                    }}>
                    💾 Save Template
                  </button>
                  <button className="btn btn-ghost btn-sm"
                    onClick={()=>{ setShowNewTmpl(false); setNewTmplName(""); setTripGear({}); setTripMembers([]); setTripCatOpen({}); }}>
                    Cancel
                  </button>
                </div>
              </div>
            )}

            {/* Templates list */}
            {tmpls.length===0&&!showNewTmpl?(
              <div style={{textAlign:"center",padding:"48px 20px",color:"var(--text3)"}}>
                <div style={{fontSize:44,marginBottom:10}}>📋</div>
                <div style={{fontSize:15,color:"var(--text2)",marginBottom:4}}>No templates yet</div>
                <div style={{fontSize:13}}>Create one above, or save any trip as a template from inside the trip.</div>
              </div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                {tmpls.map(tmpl=>{
                  const memberNames=friends.filter(f=>(tmpl.members||[]).includes(f.id)).map(f=>f.name);
                  const itemCount=(tmpl.cats||[]).reduce((a,c)=>a+(c.items||[]).length,0);
                  return(
                    <div key={tmpl.id} className="card fi">
                      <div style={{padding:"14px 16px"}}>
                        <div style={{display:"flex",alignItems:"flex-start",marginBottom:8}}>
                          <div style={{flex:1}}>
                            <div style={{fontSize:16,fontWeight:700,color:"var(--text)",marginBottom:3}}>📋 {tmpl.name}</div>
                            <div style={{fontSize:12,color:"var(--text3)"}}>
                              {itemCount} items · {(tmpl.cats||[]).length} categories
                              {memberNames.length>0&&` · ${memberNames.length} people`}
                            </div>
                          </div>
                          <button style={{background:"none",border:"none",color:"var(--danger)",fontSize:17,cursor:"pointer",lineHeight:1,padding:"0 0 0 8px"}}
                            onClick={()=>{ if(confirm(`Delete template "${tmpl.name}"?`)) deleteTemplate(tmpl.id); }}>×</button>
                        </div>
                        {memberNames.length>0&&(
                          <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
                            {memberNames.map(n=>(
                              <span key={n} style={{display:"flex",alignItems:"center",gap:4,background:"#EEF5FF",
                                borderRadius:20,padding:"2px 9px 2px 5px",fontSize:11,color:"var(--blue)"}}>
                                <Av name={n} size={14}/>{n}
                              </span>
                            ))}
                          </div>
                        )}
                        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                          <button className="btn btn-green btn-sm"
                            onClick={()=>{ createTrip(tmpl); }}>
                            ⛺ Create trip from this
                          </button>
                          <span style={{fontSize:11,color:"var(--text3)"}}>
                            Saved {ago(tmpl.createdAt||ts())}
                          </span>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* ════ TRIP CHECKLIST ════ */}
        {view==="trip"&&activeTrip&&(
          <div style={{padding:"16px 16px 60px",maxWidth:720,margin:"0 auto"}} className="fi">
            {/* Actions */}
            <div style={{display:"flex",gap:7,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
              <button className="btn btn-ghost btn-sm" onClick={()=>navigate("trips")}>← Trips</button>
              <button className="btn btn-ghost btn-sm" onClick={saveTemplate}>📋 Save as template</button>
              <button className="btn btn-ghost btn-sm" onClick={()=>{navigator.clipboard?.writeText(shareUrl);notify("Link copied!");}}>🔗 Share link</button>
            </div>

            {/* Members — compact display with collapsible editor */}
            <TripMembers activeTrip={activeTrip} friends={friends}
              tripFriends={tripFriends} notify={notify}/>

            {/* Progress card */}
            <div className="card" style={{padding:"16px 18px",marginBottom:14,display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
              <Donut pct={stats.pct} color={activeTrip.color} sz={76} sw={8}/>
              <div style={{flex:1,minWidth:120}}>
                <div style={{fontSize:22,fontWeight:700,color:activeTrip.color,lineHeight:1,marginBottom:4}}>{stats.pct}% ready</div>
                <div style={{fontSize:13,color:"var(--text2)"}}>{stats.packed} of {stats.tot} items packed</div>
                {stats.buy>0&&<div style={{fontSize:12,color:"var(--warn)",marginTop:3}}>🛒 {stats.buy} need buying</div>}
                {stats.asgn>0&&<div style={{fontSize:12,color:"var(--blue)",marginTop:2}}>👥 {stats.asgn} assigned to others</div>}
              </div>
            </div>

            {/* Filter bar */}
            {(()=>{
              const people=[...new Set(tripItems.filter(i=>i.assignedTo).map(i=>i.assignedTo))];
              const hasSE=tripItems.some(i=>i.someoneElse&&!i.assignedTo);
              const isFiltered=filters.person!=="all"||filters.status!=="all";
              return(
                <div style={{marginBottom:14}}>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
                    {[["all","All items"],["outstanding","⏳ Outstanding"],["needsBuy","🛒 Needs buying"]].map(([v,lb])=>(
                      <button key={v} onClick={()=>setFilters(f=>({...f,status:v}))}
                        style={{fontSize:12,padding:"5px 12px",borderRadius:20,border:"1.5px solid",cursor:"pointer",fontWeight:500,
                          borderColor:filters.status===v?activeTrip.color:"var(--border)",
                          background:filters.status===v?"var(--surface)":"transparent",
                          color:filters.status===v?activeTrip.color:"var(--text3)"}}>
                        {lb}
                      </button>
                    ))}
                  </div>
                  {(people.length>0||hasSE)&&(
                    <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                      <span style={{fontSize:11,color:"var(--text3)",letterSpacing:.5,fontWeight:600}}>BY PERSON</span>
                      {[["all","Everyone"],...people.map(p=>[p,p]),...(hasSE?[["Someone else","Someone else"]]:[])]
                        .map(([v,lb])=>(
                          <button key={v} onClick={()=>setFilters(f=>({...f,person:v}))}
                            style={{fontSize:12,padding:"4px 11px",borderRadius:20,border:"1.5px solid",cursor:"pointer",fontWeight:500,
                              display:"flex",alignItems:"center",gap:5,
                              borderColor:filters.person===v?"var(--blue)":"var(--border)",
                              background:filters.person===v?"#EEF5FF":"transparent",
                              color:filters.person===v?"var(--blue)":"var(--text3)"}}>
                            {v!=="all"&&v!=="Someone else"&&<span style={{width:14,height:14,borderRadius:"50%",background:ac(v),display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:700,color:"#fff",flexShrink:0}}>{v[0].toUpperCase()}</span>}
                            {lb}
                          </button>
                        ))}
                    </div>
                  )}
                  {isFiltered&&(
                    <div style={{fontSize:11,color:"var(--text3)",marginTop:6}}>
                      Showing {filtItems.length} item{filtItems.length!==1?"s":""}
                      <button onClick={()=>setFilters({person:"all",status:"all"})}
                        style={{background:"none",border:"none",color:"var(--blue)",fontSize:11,cursor:"pointer",marginLeft:8,padding:0,fontWeight:500}}>
                        Clear
                      </button>
                    </div>
                  )}
                </div>
              );
            })()}

            {/* Items */}
            <div style={{display:"flex",flexDirection:"column",gap:10}} className="stagger">
              {tripCats.map(({catId,catName,catIcon,items})=>{
                const open=expCats[`t-${catId}`]!==false;
                const done=items.filter(i=>i.packed).length;
                const allPacked=done===items.length&&items.length>0;
                const toggleAll=()=>{
                  const nowPacking=!allPacked;
                  items.forEach(i=>fbReady&&fUpd(`trips/${activeTrip.id}/items/${i.id}`,{
                    packed:nowPacking,
                    packedBy:nowPacking?(i.assignedTo||myName):null,
                    packedAt:nowPacking?ts():null
                  }));
                };
                return(
                  <div key={catId} className="card fi">
                    <div style={{display:"flex",alignItems:"center",padding:"13px 16px",gap:10}}>
                      <div style={{display:"flex",alignItems:"center",gap:10,flex:1,cursor:"pointer",minWidth:0}}
                        onClick={()=>setExpCats(p=>({...p,[`t-${catId}`]:!open}))}>
                        <span style={{fontSize:18,flexShrink:0}}>{catIcon}</span>
                        <span style={{flex:1,fontSize:15,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{catName}</span>
                        <span style={{fontSize:12,color:allPacked?"var(--accent)":"var(--text3)",flexShrink:0}}>{done}/{items.length}</span>
                        {allPacked&&<span style={{fontSize:14}}>✅</span>}
                        <span style={{fontSize:11,color:"var(--text3)",marginLeft:2,flexShrink:0}}>{open?"▲":"▼"}</span>
                      </div>
                      <button onClick={e=>{e.stopPropagation();toggleAll();}}
                        style={{flexShrink:0,fontSize:11,fontWeight:600,padding:"3px 9px",borderRadius:7,
                          border:"1.5px solid",cursor:"pointer",
                          borderColor:allPacked?"var(--danger)":"var(--accent)",
                          color:allPacked?"var(--danger)":"var(--accent)",
                          background:"transparent"}}>
                        {allPacked?"✕ Unpack":"✓ Pack all"}
                      </button>
                    </div>
                    {open&&(
                      <>
                        {items.map(item=>(
                          <ItemRow key={item.id} item={item} tripId={activeTrip.id}
                            myName={myName} friends={tripFriends} fbReady={fbReady}
                            onSaveToInv={saveItemToInventory}/>
                        ))}
                        <div style={{padding:"9px 12px",borderTop:"1px solid var(--border)",background:"var(--surf2)",display:"flex",gap:8}}>
                          <input className="inp" style={{flex:1,fontSize:13,padding:"7px 11px"}} placeholder="Add item to trip…"
                            value={nim[`t-${catId}`]||""}
                            onChange={e=>setNim(p=>({...p,[`t-${catId}`]:e.target.value}))}
                            onKeyDown={e=>e.key==="Enter"&&addTripItem(catId,catName,catIcon)}/>
                          <button className="btn btn-blue btn-sm" onClick={()=>addTripItem(catId,catName,catIcon)}>Add</button>
                        </div>
                      </>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ════ DASHBOARD ════ */}
        {view==="dashboard"&&activeTrip&&(
          <div style={{padding:"16px 16px 60px",maxWidth:720,margin:"0 auto"}} className="fi">
            <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:18}}>
              <button className="btn btn-ghost btn-sm" onClick={()=>navigate("trip",activeId)}>← Checklist</button>
              <span style={{fontFamily:"var(--serif)",fontSize:20,flex:1}}>{activeTrip.name}</span>
            </div>

            {/* Donut overview */}
            <div className="card" style={{padding:20,marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:600,letterSpacing:.7,color:"var(--text3)",marginBottom:16}}>OVERVIEW</div>
              <div style={{display:"flex",justifyContent:"space-around",flexWrap:"wrap",gap:16}}>
                <Donut pct={stats.pct} color={activeTrip.color} sz={88} sw={8} label={`${stats.pct}%`} sub="Packed"/>
                <Donut pct={stats.tot?~~(stats.buy/stats.tot*100):0} color="var(--warn)" sz={88} sw={8} label={String(stats.buy)} sub="To buy"/>
                <Donut pct={stats.tot?~~(stats.asgn/stats.tot*100):0} color="var(--blue)" sz={88} sw={8} label={String(stats.asgn)} sub="Assigned"/>
                <Donut pct={stats.tot?~~((stats.tot-stats.packed)/stats.tot*100):0} color="var(--danger)" sz={88} sw={8} label={String(stats.tot-stats.packed)} sub="Outstanding"/>
              </div>
            </div>

            {/* Category bars */}
            <div className="card" style={{padding:20,marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:600,letterSpacing:.7,color:"var(--text3)",marginBottom:16}}>BY CATEGORY</div>
              <CatBars items={tripItems} color={activeTrip.color}/>
            </div>

            {/* Who has what */}
            <div className="card" style={{padding:20}}>
              <div style={{fontSize:11,fontWeight:600,letterSpacing:.7,color:"var(--text3)",marginBottom:16}}>WHO HAS WHAT</div>
              <WhoHasWhat items={tripItems}/>
            </div>
          </div>
        )}

        {/* ════ CHAT ════ */}
        {view==="chat"&&activeTrip&&(
          <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 54px)"}}>
            <div style={{flex:1,overflowY:"auto",padding:"16px",display:"flex",flexDirection:"column",gap:12}}>
              {chatList.length===0&&(
                <div style={{textAlign:"center",color:"var(--text3)",fontSize:13,marginTop:40,lineHeight:1.8}}>
                  No messages yet.<br/>Kick off the conversation!
                </div>
              )}
              {chatList.map(msg=>{
                const me=msg.author===myName;
                return(
                  <div key={msg.id} style={{display:"flex",flexDirection:me?"row-reverse":"row",gap:8,alignItems:"flex-end"}}>
                    {!me&&<Av name={msg.author} size={28}/>}
                    <div style={{maxWidth:"72%"}}>
                      {!me&&<div style={{fontSize:11,color:"var(--text3)",marginBottom:3,paddingLeft:3}}>{msg.author}</div>}
                      <div className={me?"bubble-me":"bubble-them"} style={{padding:"10px 14px",fontSize:14,lineHeight:1.55}}>
                        {msg.text}
                      </div>
                      <div style={{fontSize:10,color:"var(--text3)",marginTop:3,textAlign:me?"right":"left",paddingLeft:me?0:3}}>
                        {ago(msg.ts)}
                      </div>
                    </div>
                  </div>
                );
              })}
              <div ref={chatBtm}/>
            </div>
            <div style={{padding:"10px 14px 14px",background:"var(--surface)",borderTop:"1px solid var(--border)",
              display:"flex",gap:8}}>
              <input className="inp" style={{flex:1}} placeholder="Message…"
                value={chatTxt} onChange={e=>setChatTxt(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&sendChat()}/>
              <button className="btn btn-blue" onClick={sendChat}>Send</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
